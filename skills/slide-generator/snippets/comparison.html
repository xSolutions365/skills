<!--
  Layout: comparison element (use inside any layout or standalone)
  Theme:  dark
  Background Color: #0A0019 (Carbon)
  Acid Bar: no
  Footer Logo: bottom-right, white logo (image3.png)

  Two-column before/after comparison.
  .before gets red accent, .after gets green accent.

  Copy this <section> into your presentation.
-->
<section data-background-color="#0A0019">
  <h2>Before &amp; After</h2>
  <div class="comparison" style="margin-top: var(--cf-space-xl);">
    <div class="before">
      <div class="comparison-label">Before</div>
      <h3>Old Approach</h3>
      <ul>
        <li>Pain point one</li>
        <li>Pain point two</li>
        <li>Pain point three</li>
      </ul>
    </div>
    <div class="after">
      <div class="comparison-label">After</div>
      <h3>New Approach</h3>
      <ul>
        <li>Improvement one</li>
        <li>Improvement two</li>
        <li>Improvement three</li>
      </ul>
    </div>
  </div>
  <div class="slide-footer">
    <img src="../../assets/images/image3.png" alt="CreateFuture">
  </div>
</section>
