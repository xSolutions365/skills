<!--
  Layout: layout-three-col
  Theme:  dark
  Background Color: #0A0019 (Carbon) or use a background image
  Acid Bar: no
  Footer Logo: bottom-right, white logo (image3.png)

  Works well with: stat-card, card, card-highlight elements.
  The heading goes OUTSIDE the grid div, then the grid contains 3 children.

  Copy this <section> into your presentation.
-->

<!-- VARIANT A: Three stat cards -->
<section data-background-image="../../assets/images/image36.png"
         data-background-size="cover"
         data-background-position="center">
  <h2>Key Metrics</h2>
  <div class="layout-three-col" style="margin-top: var(--cf-space-xl);">
    <div class="stat-card brand fragment scale-in">
      <div class="number">96%</div>
      <div class="label">Metric One</div>
      <div class="sublabel">Additional context</div>
    </div>
    <div class="stat-card success fragment scale-in">
      <div class="number">10x</div>
      <div class="label">Metric Two</div>
      <div class="sublabel">Additional context</div>
    </div>
    <div class="stat-card fragment scale-in">
      <div class="number">30+</div>
      <div class="label">Metric Three</div>
      <div class="sublabel">Additional context</div>
    </div>
  </div>
</section>
