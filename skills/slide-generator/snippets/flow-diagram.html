<!--
  Element: flow, flow-vertical, flow-branch
  Theme:  dark
  Background Color: #0A0019 (Carbon) or #24004C (Midnight)
  Acid Bar: no
  Footer Logo: bottom-right, white logo (image3.png)

  Flow diagrams are built from .flow-node boxes and .flow-arrow connectors.
  Nodes can be styled: (default), .accent (acid), .highlight (pink), .success (green).
  Arrows use the → character (or ↓ for vertical).

  Three variants:
    .flow            Horizontal left-to-right
    .flow-vertical   Vertical top-to-bottom
    .flow-branch     Branching paths (decision tree)
-->

<!-- VARIANT A: Horizontal flow -->
<section data-background-color="#0A0019">
  <h2>Pipeline Flow</h2>
  <div class="flow" style="margin-top: var(--cf-space-xl);">
    <div class="flow-step fragment fade-up">
      <div class="flow-node accent">
        <h4>Input</h4>
        <p>BDD Features</p>
      </div>
    </div>
    <div class="flow-step fragment fade-up">
      <span class="flow-arrow">→</span>
      <div class="flow-node">
        <h4>Generate</h4>
        <p>AI writes tests</p>
      </div>
    </div>
    <div class="flow-step fragment fade-up">
      <span class="flow-arrow">→</span>
      <div class="flow-node">
        <h4>Execute</h4>
        <p>Run on devices</p>
      </div>
    </div>
    <div class="flow-step fragment fade-up">
      <span class="flow-arrow">→</span>
      <div class="flow-node highlight">
        <h4>Heal</h4>
        <p>Auto-fix failures</p>
      </div>
    </div>
    <div class="flow-step fragment fade-up">
      <span class="flow-arrow">→</span>
      <div class="flow-node success">
        <h4>Report</h4>
        <p>HTML + PR</p>
      </div>
    </div>
  </div>
  <div class="slide-footer">
    <img src="../../assets/images/image3.png" alt="CreateFuture">
  </div>
</section>
