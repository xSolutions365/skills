<!--
  Layout: layout-top-bottom
  Theme:  dark
  Background Color: #0A0019 (Carbon)
  Acid Bar: no
  Footer Logo: bottom-right, white logo (image3.png)

  Heading in first child, content in second child.
  Second child gets flex:1 so it fills remaining vertical space.
  Great for: heading + grid of cards, heading + table, heading + comparison.

  Copy this <section> into your presentation.
-->
<section data-background-color="#0A0019">
  <div class="layout-top-bottom">
    <div>
      <h2>Slide Title</h2>
      <p>Optional subtitle or intro text.</p>
    </div>
    <div>
      <!-- Put your main content here: a grid, table, cards, etc. -->
      <div class="comparison">
        <div class="before">
          <div class="comparison-label">Before</div>
          <h3>Old Approach</h3>
          <ul>
            <li>Problem one</li>
            <li>Problem two</li>
          </ul>
        </div>
        <div class="after">
          <div class="comparison-label">After</div>
          <h3>New Approach</h3>
          <ul>
            <li>Improvement one</li>
            <li>Improvement two</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
  <div class="slide-footer">
    <img src="../../assets/images/image3.png" alt="CreateFuture">
  </div>
</section>
